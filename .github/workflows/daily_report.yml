name: Daily Email Report

on:
  schedule:
    # Runs at 8:00 AM UTC (which is 4:00 AM EST / 3:00 AM Toronto time)
    # Change the hour if you want a different time.
    - cron: '0 8 * * *'
  
  # Allows you to run this manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run the email report script
        env:
          DB_ENDPOINT: ${{ secrets.DB_ENDPOINT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: |
          python src/reports/email_report.py